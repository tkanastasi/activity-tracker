<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>30 Days Activity Challenge</title>
    <link rel="icon" href="./assets/favicon.ico">
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >
<style>
:root {
    --cream: #FAF4E4;        /* фон страницы */

    --charcoal: #2F2F2F;     /* основной текст */
    --stone: #737373;        /* вторичный текст */

    --butter-yellow: #FFEA8B; /* карточки */
    --apricot: #FFBB5C; /* скроллбар */
    --pale-blue: #BACDED;     /* блок прогресса */

    --sage-green: #6EB874;    /* галочки, прогресс, кнопка */
    --soft-pink: #F6CAE3;     /* сброс */

    --cloud-gray: #E5E7EB;    /* фон полосы прогресса */

    --white: #FFFFFF;         /* textarea */
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 24px;
    background: var(--cream);
    color: var(--charcoal);
    font-family: "Outfit", sans-serif;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    margin-bottom: 24px;
}

h1 {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 35px;
    font-weight: 700;
    margin-bottom: 8px;
}

.logo-icon {
    width: 42px;
    height: 42px;
    vertical-align: middle;
}

.subtitle {
    color: var(--stone);
}

.fire-icon {
    width: 18px;
    height: 18px;

    vertical-align: middle;

    margin-right: 6px;
}

.stats {
    background: var(--pale-blue);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 24px;
    border: none;
}

.progress-bar {
    height: 5px;
    background: var(--cloud-gray);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 12px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: var(--sage-green);
    transition: 0.3s;
}

.days-grid {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 10px;
    scroll-snap-type: x proximity;
    scroll-behavior: smooth;
}

.days-grid::-webkit-scrollbar {
    height: 8px;
}

.days-grid::-webkit-scrollbar-track {
    background: var(--cloud-gray);
    border-radius: 999px;
}

.days-grid::-webkit-scrollbar-thumb {
    background: var(--pale-blue);
    border-radius: 999px;
}

.day-card {
    background: var(--butter-yellow);
    border-radius: 24px;
    padding: 15px;
    border: none;
    flex: 0 0 280px;
    scroll-snap-align: start;
}

.day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.day-title {
    font-weight: 600;
}

.status-icon {
    width: 25px;
    height: 25px;

    display: flex;
    align-items: center;
    justify-content: center;
}

.check-icon {
    width: 25px;
    height: 25px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
}

textarea {
    width: 100%;
    min-height: 100px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    resize: vertical;
    font-family: inherit;

    background: var(--white);
}

.date {
    margin-top: 8px;
    font-size: 12px;
    color: var(--stone);
}

.actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
}

button {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    transition:
    transform 0.15s ease,
    opacity 0.15s ease;
}
button:active {
    transform: scale(0.97);
}

.primary {
    background: var(--sage-green);
}

.secondary {
    background: var(--soft-pink);
}

/* mobile */
@media (max-width: 768px) {
    .days-grid::-webkit-scrollbar {
        display: none;
    }

    .days-grid {
        scrollbar-width: none;
    }
}

@media (max-width: 768px) {
    .day-card {
        flex: 0 0 85vw;
    }

}
/* mobile */
</style>
</head>
<body>

<div class="container">

<header>
    <h1>
        <img
            src="./assets/yoga.svg"
            alt=""
            class="logo-icon"
        />

    30 Days Activity Challenge
</h1>
</header>

<div class="stats">
    <strong id="progressText">0 / 30 дней</strong>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<div class="days-grid" id="daysGrid"></div>

<div class="actions">
    <button class="primary" onclick="exportData()">
        Экспорт данных
    </button>

    <button class="secondary" onclick="resetChallenge()">
        Сбросить всё
    </button>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const STORAGE_KEY = "pilatesChallenge30";
const CHALLENGE_START = "2026-06-01";

/* Supabase */
const SUPABASE_URL =
    "https://cudzjponpaqjaeeqigzf.supabase.co";

const SUPABASE_KEY =
    "sb_publishable_P5kul4vzfnQ4AV8ytgdf9A_D7bRHhck";

const supabaseClient =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );
/* Supabase */

const FIRE_ICON =
    '<img src="./assets/fire.svg" class="fire-icon">';

function getAvailableDays() {
    const armeniaNow = new Date(
        new Date().toLocaleString(
            "en-US",
            {
                timeZone: "Asia/Yerevan"
            }
        )
    );

    const startDate =
        new Date(CHALLENGE_START);

    const diffDays =
        Math.floor(
            (
                armeniaNow -
                startDate
            ) /
            (1000 * 60 * 60 * 24)
        ) + 1;

    return Math.min(
        Math.max(diffDays, 1),
        30
    );
}

let data = JSON.parse(
    localStorage.getItem(STORAGE_KEY)
) || createDefaultData();

function createDefaultData() {
    return Array.from({ length: 30 }, (_, i) => ({
        day: i + 1,
        completed: false,
        
        activity: "",
        nutrition: "",

        completedAt: ""
    }));
}

async function save() {

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

    await supabaseClient
        .from("challenge_data")
        .update({
            data: data
        })
        .eq("id", 1);

    updateStats();
}

/* Supabase */
async function loadFromSupabase() {

    const { data: result, error } =
        await supabaseClient
            .from("challenge_data")
            .select("data")
            .eq("id", 1)
            .single();

    if (error) {
        console.error(error);
        return;
    }

    if (result?.data?.length) {
        data = result.data;
    }
}
/* Supabase */

function updateStats() {

    const completed = data.filter(
        d => d.completed
    ).length;

    const percent =
        (completed / 30) * 100;

    const fire =
    completed > 0
        ? FIRE_ICON
        : "";

    document.getElementById(
        "progressText"
    ).innerHTML =
        `${fire} ${completed} / 30 дней`;

    document.getElementById(
        "progressFill"
    ).style.width =
        `${percent}%`;
}

function render() {
    const grid =
        document.getElementById(
            "daysGrid"
        );

    grid.innerHTML = "";

    const availableDays =
        getAvailableDays();

    data
        .slice(0, availableDays)
        .forEach(item => {
        const card =
            document.createElement("div");

        card.className =
            "day-card";

        card.innerHTML = `
            <div class="day-header">
                <div class="day-title">
                    День ${item.day}
                </div>
            
                <div class="status-icon">
                    ${item.completed
                        ? '<img src="./assets/check.svg" class="check-icon">'
                        : ''}
                </div>
            </div>
            
            <label>Активность</label>
            <textarea
                class="activity"
                placeholder="Что делала сегодня?"
            >${item.activity || ""}</textarea>
            
            <label>Питание</label>
            <textarea
                class="nutrition"
                placeholder="Что хочется отметить?"
            >${item.nutrition || ""}</textarea>

            <div class="date">
                ${
                    item.completedAt
                    ? "Последнее выполнение: " +
                      item.completedAt
                    : ""
                }
            </div>
        `;

        const activity =
            card.querySelector(
                ".activity"
            );

        const nutrition =
            card.querySelector(
                ".nutrition"
            );

        const statusIcon =
            card.querySelector(
                ".status-icon"
            );

        activity.addEventListener(
            "input",
            () => {
            
                item.activity =
                    activity.value;
            
                item.completed =
                    item.activity
                        .trim() !== "";
                
                statusIcon.innerHTML =
                    item.completed
                        ? '<img src="./assets/check.svg" class="check-icon">'
                        : '';
            
                item.completedAt =
                    item.completed
                    ? new Date().toLocaleString(
                        "ru-RU",
                        {
                            dateStyle: "short",
                            timeStyle: "short"
                        }
                    )
                    : "";
                    
                save();
            }
        );

        nutrition.addEventListener(
            "input",
            () => {
            
                item.nutrition =
                    nutrition.value;
            
                save();
            }
        );

        grid.appendChild(card);
    });

    updateStats();

    grid.scrollLeft =
        grid.scrollWidth;
}

function exportData() {
    const blob =
        new Blob(
            [
                JSON.stringify(
                    data,
                    null,
                    2
                )
            ],
            {
                type:
                    "application/json"
            }
        );

    const url =
        URL.createObjectURL(
            blob
        );

    const a =
        document.createElement(
            "a"
        );

    a.href = url;
    a.download =
        "pilates-challenge.json";

    a.click();

    URL.revokeObjectURL(url);
}

function resetChallenge() {

    if (
        confirm(
            "Удалить весь прогресс?"
        )
    ) {

        localStorage.removeItem(
            STORAGE_KEY
        );

        data =
            createDefaultData();

        render();
    }
}

(async () => {

    await loadFromSupabase();

    render();
    updateStats();

})();
</script>

</body>
</html>
