<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>30 Days Activity Challenge</title>
    <link rel="icon" href="./assets/favicon.ico">

<style>
:root {
    --bg: #e7efe2;
    --card: #fbfaf7;

    --accent: #6f8f72;
    --accent-light: #dfe8dd;

    --text: #4f3b2b;
    --muted: #766252;

    --border: #d8d2c8;

    --success: #5f8a65;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

header {
    margin-bottom: 24px;
}

h1 {
    color: #654631;
    margin-bottom: 8px;
}

.subtitle {
    color: var(--muted);
}

.stats {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
}

.progress-bar {
    height: 5px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 12px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: 0.3s;
}

.days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
    gap: 16px;
}

.day-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border);
}

.day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.day-title {
    font-weight: 600;
}

.completed {
    accent-color: var(--success);
    width: 20px;
    height: 20px;

    pointer-events: none;
}

textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    resize: vertical;
    font-family: inherit;

    background: #ffffff;
}

.date {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
}

.actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
}

button {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    transition:
    transform 0.15s ease,
    opacity 0.15s ease;
}
button:active {
    transform: scale(0.97);
}

.primary {
    background: var(--accent);
    color: white;
}

.secondary {
    background: #eee6dc;
    color: #8b5e3c;
}

.streak {
    margin-top: 12px;
    color: var(--muted);
}
</style>
</head>
<body>

<div class="container">

<header>
    <h1>🧘 30 Days Activity Challenge</h1>

    <div class="subtitle">
        Забочусь о себе в своём темпе
    </div>
</header>

<div class="stats">
    <strong id="progressText">0 / 30 дней</strong>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<div class="days-grid" id="daysGrid"></div>

<div class="actions">
    <button class="primary" onclick="exportData()">
        Экспорт данных
    </button>

    <button class="secondary" onclick="resetChallenge()">
        Сбросить всё
    </button>
</div>

</div>

<script>
const STORAGE_KEY = "pilatesChallenge30";
const CHALLENGE_START = "2026-06-01";

function getAvailableDays() {
    const armeniaNow = new Date(
        new Date().toLocaleString(
            "en-US",
            {
                timeZone: "Asia/Yerevan"
            }
        )
    );

    const startDate =
        new Date(CHALLENGE_START);

    const diffDays =
        Math.floor(
            (
                armeniaNow -
                startDate
            ) /
            (1000 * 60 * 60 * 24)
        ) + 1;

    return Math.min(
        Math.max(diffDays, 1),
        30
    );
}

let data = JSON.parse(
    localStorage.getItem(STORAGE_KEY)
) || createDefaultData();

function createDefaultData() {
    return Array.from({ length: 30 }, (_, i) => ({
        day: i + 1,
        completed: false,
        
        activity: "",
        nutrition: "",

        completedAt: ""
    }));
}

function save() {
    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

    updateStats();
}

function updateStats() {

    const completed = data.filter(
        d => d.completed
    ).length;

    const percent =
        (completed / 30) * 100;

    let emoji = "";

    if (completed >= 20) {
        emoji = "🔥🔥🔥";
    } else if (completed >= 10) {
        emoji = "🔥🔥";
    } else if (completed > 0) {
        emoji = "🔥";
    }

    document.getElementById(
        "progressText"
    ).textContent =
        `${emoji} ${completed} / 30 дней`;

    document.getElementById(
        "progressFill"
    ).style.width =
        `${percent}%`;
}

function render() {
    const grid =
        document.getElementById(
            "daysGrid"
        );

    grid.innerHTML = "";

    const availableDays =
        getAvailableDays();

    data
        .slice(0, availableDays)
        .forEach(item => {
        const card =
            document.createElement("div");

        card.className =
            "day-card";

        card.innerHTML = `
            <div class="day-header">
                <div class="day-title">
                    День ${item.day}
                </div>
            
                <input
                    type="checkbox"
                    class="completed"
                    ${item.completed ? "checked" : ""}
                >
            </div>
            
            <label>Активность</label>
            <textarea
                class="activity"
                placeholder="Что делала сегодня?"
            >${item.activity || ""}</textarea>
            
            <label>Питание</label>
            <textarea
                class="nutrition"
                placeholder="Что хочется отметить?"
            >${item.nutrition || ""}</textarea>

            <div class="date">
                ${
                    item.completedAt
                    ? "Последнее выполнение: " +
                      item.completedAt
                    : ""
                }
            </div>
        `;

        const checkbox =
            card.querySelector(
                "input"
            );

        const activity =
            card.querySelector(
                ".activity"
            );

        const nutrition =
            card.querySelector(
                ".nutrition"
            );

        activity.addEventListener(
            "input",
            () => {
            
                item.activity =
                    activity.value;
            
                item.completed =
                    item.activity
                        .trim() !== "";
            
                item.completedAt =
                    item.completed
                    ? new Date().toLocaleString(
                        "ru-RU",
                        {
                            dateStyle: "short",
                            timeStyle: "short"
                        }
                    )
                    : "";
                    
                checkbox.checked =
                    item.completed;
                    
                save();
            }
        );

        nutrition.addEventListener(
            "input",
            () => {
            
                item.nutrition =
                    nutrition.value;
            
                save();
            }
        );

        grid.appendChild(card);
    });

    updateStats();
}

function exportData() {
    const blob =
        new Blob(
            [
                JSON.stringify(
                    data,
                    null,
                    2
                )
            ],
            {
                type:
                    "application/json"
            }
        );

    const url =
        URL.createObjectURL(
            blob
        );

    const a =
        document.createElement(
            "a"
        );

    a.href = url;
    a.download =
        "pilates-challenge.json";

    a.click();

    URL.revokeObjectURL(url);
}

function resetChallenge() {

    if (
        confirm(
            "Удалить весь прогресс?"
        )
    ) {

        localStorage.removeItem(
            STORAGE_KEY
        );

        data =
            createDefaultData();

        render();
    }
}

render();
</script>

</body>
</html>
